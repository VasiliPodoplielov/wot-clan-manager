<ng-template #socialButtons>
  <div class="social-login mt-3">
    <button
      pButton
      label="Wargaming.net"
      icon="pi pi-shield"
      class="p-button-raised p-button-danger mb-2"
      (click)="loginWithWG()"
    ></button>
    <button
      pButton
      label="Google"
      icon="pi pi-google"
      class="p-button-raised p-button-secondary"
      (click)="loginWithGoogle()"
    ></button>
  </div>
</ng-template>

<div class="login-container">
  <p-card styleClass="login-card">
    <p-tabs value="0">
      <p-tablist>
        <p-tab value="0">Увійти</p-tab>
        <p-tab value="1">Реєстрація</p-tab>
      </p-tablist>

      <p-tabpanels>
        <p-tabpanel value="0">
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="flex flex-column gap-2 mb-3">
              <label for="email" class="font-bold">Email</label>
              <input pInputText id="email" formControlName="email" type="email" class="w-full" />
            </div>
            <div class="flex flex-column gap-2 mb-4">
              <label for="password" class="font-bold">Пароль</label>
              <input
                pInputText
                id="password"
                formControlName="password"
                type="password"
                class="w-full"
              />
            </div>
            <button
              pButton
              label="Увійти"
              icon="pi pi-sign-in"
              class="w-full"
              [disabled]="!loginForm.valid"
            ></button>
          </form>

          <p-divider align="center">АБО</p-divider>

          <ng-container *ngTemplateOutlet="socialButtons"></ng-container>
        </p-tabpanel>

        <p-tabpanel value="1">
          <div class="flex flex-column gap-3 mt-3">
            <div class="flex flex-column gap-2">
              <label class="font-bold">Ігровий нікнейм</label>
              <input pInputText placeholder="Нік у грі" class="w-full" />
            </div>
            <div class="flex flex-column gap-2">
              <label class="font-bold">Email</label>
              <input pInputText type="email" class="w-full" />
            </div>
            <div class="flex flex-column gap-2">
              <label class="font-bold">Пароль</label>
              <input pInputText type="password" class="w-full" />
            </div>
            <button pButton label="Створити аккаунт" severity="success" class="w-full"></button>
          </div>

          <p-divider align="center">АБО</p-divider>

          <ng-container *ngTemplateOutlet="socialButtons"></ng-container>
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </p-card>
</div>
